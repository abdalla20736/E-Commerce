<div class="rounded-xl border border-gray-100 bg-white p-6 shadow-sm">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-center lg:col-span-2">
    <img
      src="https://via.placeholder.com/300x300.png?text=Product+Image"
      alt="Woman Standart Fit Knitted Cardigan"
      class="h-28 w-28 flex-none rounded-xl object-cover"
    />

    <div class="flex flex-1 flex-col gap-4 sm:ml-6">
      <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">
        <div>
          <h2 class="text-lg font-semibold text-slate-900 hover:text-primary-600 transition-all">
            <a [routerLink]="['/products/']"> Woman Standart Fit Knitted Cardigan </a>
          </h2>
          <span
            class="inline-flex items-center rounded-full bg-emerald-50 px-3 py-1 text-xs font-medium text-primary-700 mt-2"
          >
            Women's Fashion
          </span>
        </div>
      </div>
      <span class="text-primary-600 font-bold text-lg">449 EGP</span>

      <div class="flex flex-col items-start gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div
          class="flex items-center gap-2 rounded-xl border border-slate-200 bg-white p-1 shadow-sm"
        >
          <button
            type="button"
            class="h-8 w-8 rounded-lg border border-slate-200 text-slate-600 transition hover:bg-slate-50"
          >
            -
          </button>
          <span class="w-10 text-center text-lg font-semibold text-slate-900">8</span>
          <button
            type="button"
            class="h-8 w-8 rounded-lg border border-slate-200 bg-primary-600 text-white transition hover:bg-primary-700"
          >
            +
          </button>
        </div>

        <div class="flex items-start gap-2 sm:items-end">
          <div>
            <p class="text-xs text-gray-500 mb-0.5 text-end">Total</p>
            <div class="flex items-center gap-2">
              <p class="text-lg font-semibold text-slate-900">3,592</p>
              <p class="text-xs text-gray-500">EGP</p>
            </div>
          </div>

          <div></div>

          <button
            type="button"
            class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-red-50 border border-red-200 text-red-500 transition hover:bg-red-500 hover:text-white cursor-pointer"
            aria-label="Remove item"
          >
            <i class="fas fa-trash-alt"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
