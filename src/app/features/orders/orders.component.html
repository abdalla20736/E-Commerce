<section class="min-h-screen py-8 px-4">
  <div class="container mx-auto">
    @if (orders().length > 0) {
      <div class="mb-8">
        <nav class="flex items-center gap-1.5 text-sm text-gray-400 mb-6">
          <a routerLink="/home" class="hover:text-primary-700 transition-colors duration-150"
            >Home</a
          >
          <span class="text-gray-300">/</span>
          <span class="text-gray-700 font-semibold">My Orders</span>
        </nav>

        <div class="flex items-center justify-between">
          <div class="flex items-start gap-3">
            <div
              class="size-14 bg-green-600 rounded-xl flex items-center justify-center shrink-0 shadow-sm"
            >
              <i class="fas fa-box text-2xl text-white"></i>
            </div>
            <div>
              <h1 class="text-gray-900 font-extrabold text-3xl leading-tight">My Orders</h1>
              <p class="text-gray-500 text-sm mt-0.5">
                Track and manage your
                {{ orders().length + orders().length === 1 ? 'order' : 'orders' }}
              </p>
            </div>
          </div>

          <a
            routerLink="/products"
            class="hover:bg-primary-50 px-4 py-2 rounded-xl flex items-center gap-2 text-primary-600 hover:text-primary-700 text-sm font-medium transition-colors duration-150"
          >
            <i class="fas fa-bag-shopping text-xs"></i>
            Continue Shopping
          </a>
        </div>
      </div>
      
      @for (order of orders(); track $index) {
        <app-order-card [order]="order"></app-order-card>
      }
    } @else if (isLoading()) {
      <div class="text-center min-h-[60vh] flex flex-col items-center justify-center">
        <div
          class="mx-auto mb-4 bg-primary-50 rounded-2xl size-20 flex items-center justify-center"
        >
          <i class="fas fa-spinner fa-spin text-primary-600 text-3xl"></i>
        </div>
        <p class="text-gray-900">Loading your orders...</p>
        <p class="text-gray-500 text-sm">Please wait</p>
      </div>
    } @else {
      <app-orders-empty-state></app-orders-empty-state>
    }
  </div>
</section>

<app-features-section></app-features-section>
