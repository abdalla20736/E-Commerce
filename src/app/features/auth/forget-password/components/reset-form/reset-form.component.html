<div class="rounded-2xl bg-white p-8 shadow-xl lg:p-12">
  <div class="text-center">
    <h1 class="text-3xl font-bold text-primary-600">
      Fresh<span class="text-slate-800">Cart</span>
    </h1>
    <h3 class="mt-4 text-2xl font-bold text-slate-900">Forgot Password?</h3>
    <p class="mt-3 text-gray-600">No worries, we'll send you a reset code</p>
  </div>

  <div class="mx-auto mt-8 px-10 flex max-w-sm items-center gap-1.5" aria-hidden="true">
    <span
      class="flex size-10 items-center justify-center rounded-full bg-primary-600 text-white ring-4 ring-primary-100"
    >
      <i class="fas fa-envelope text-sm"></i>
    </span>
    <span
      [class]="stepNumber() === 2 ? 'bg-primary-600 ' : 'bg-gray-200'"
      class="h-0.5 flex-1 bg-gray-200"
    ></span>
    <span
      [class]="
        stepNumber() === 2
          ? 'bg-primary-600 text-white ring-primary-100'
          : 'bg-slate-100 text-slate-400'
      "
      class="flex size-10 items-center justify-center rounded-full"
    >
      <i class="fas fa-key text-xs"></i>
    </span>
    <span
      [class]="stepNumber() === 3 ? 'bg-primary-600 ' : 'bg-gray-200'"
      class="h-0.5 flex-1"
    ></span>
    <span
      [class]="
        stepNumber() === 3
          ? 'bg-primary-600 text-white ring-primary-100'
          : 'bg-slate-100 text-slate-400'
      "
      class="flex size-10 items-center justify-center rounded-full bg-slate-100 text-slate-400"
    >
      <i class="fas fa-lock text-xs"></i>
    </span>
  </div>

  @if (stepNumber() === 1) {
    <app-send-reset-code (codeSent)="nextStepInit($event)" [email]="email()"></app-send-reset-code>
  } @else if (stepNumber() === 2) {
    <app-verification-code
      (backToSendCode)="backToSendCode()"
      (codeVerified)="stepNumber.set(3)"
      [email]="email()"
    ></app-verification-code>
  } @else if (stepNumber() === 3) {
    <app-create-new-password></app-create-new-password>
  }
</div>
